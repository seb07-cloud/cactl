name: MFA for Microsoft partners and vendors
description: Verify the enabled MFA policy correctly requires MFA for all users except excluded role

policies:
  - multifactor-authentication-for-microsoft-partners-and-vendors

scenarios:
  - name: Regular user gets MFA requirement
    context:
      user: partner@vendor.com
      application: All
      clientAppType: all
    expect:
      result: grant
      controls:
        - mfa

  - name: Excluded role is not challenged
    context:
      user: excluded-admin@contoso.com
      roles:
        - "d29b2b05-8046-44ba-8758-1e26182fcf32"
      application: All
      clientAppType: all
    expect:
      result: notApplicable
