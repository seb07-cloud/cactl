name: Disabled policies should not apply
description: Verify disabled CAP policies return notApplicable when evaluated in isolation

policies:
  - cap001-global-identityprotection-allapps-anyplatform-block-legacy-authentication
  - cap002-global-identityprotection-allapps-anyplatform-block-device-code-flow
  - cap100-admin-identityprotection-allapps-anyplatform-block-high-risk-sign-ins

scenarios:
  - name: Legacy auth client is not blocked when policy disabled
    context:
      user: user@contoso.com
      application: All
      clientAppType: exchangeActiveSync
    expect:
      result: notApplicable

  - name: Device code flow is not blocked when policy disabled
    context:
      user: user@contoso.com
      application: All
      clientAppType: all
    expect:
      result: notApplicable

  - name: High-risk sign-in for admin group is not blocked when policy disabled
    context:
      user: admin@contoso.com
      groups:
        - "132a2b14-cb21-4da6-aea3-7562b4989f96"
      application: All
      signInRiskLevel: high
    expect:
      result: notApplicable
