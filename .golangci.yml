version: "2"

linters:
  default: standard
  enable:
    - exhaustive
    - testifylint
    - errorlint
    - gocritic
    - gosec
    - prealloc
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: false
    testifylint:
      enable-all: true

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
