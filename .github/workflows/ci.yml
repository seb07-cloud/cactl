name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: go test -race -coverprofile=cover.out -covermode=atomic ./...
      - name: Coverage summary
        run: |
          echo "=== Coverage by package ==="
          go tool cover -func=cover.out | grep -E "(internal/graph|internal/reconcile|total)"
      - name: Enforce coverage threshold
        run: |
          # Filter cover.out to exclude packages that need external deps (Azure SDK, terminal UI, CLI)
          head -1 cover.out > cover-filtered.out
          tail -n +2 cover.out | grep -vE "internal/tui/|internal/auth/|cactl/cmd/" >> cover-filtered.out || true
          COVERAGE=$(go tool cover -func=cover-filtered.out | grep "^total:" | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excluding tui/auth/cmd): ${COVERAGE}%"
          if awk "BEGIN {exit !(${COVERAGE}+0 < 80)}"; then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
